<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英雄联盟 - 正义审判庭</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登录页面 -->
    <div id="login-page" class="page active">
        <div class="login-container">
            <div class="logo-area">
                <div class="logo-icon">&#9878;</div>
                <h1>正义审判庭</h1>
                <p class="subtitle">League of Legends Tribunal</p>
            </div>
            <div class="login-form">
                <input type="text" id="username" placeholder="请输入你的召唤师名称" maxlength="16">
                <button id="enter-btn" onclick="enterTribunal()">进入审判庭</button>
            </div>
            <div class="online-count">
                已有 <span id="login-member-count">0</span> 位召唤师加入审判庭
            </div>
        </div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- 主页面 -->
    <div id="main-page" class="page">
        <header>
            <div class="header-left">
                <span class="header-logo">&#9878;</span>
                <span class="header-title">正义审判庭</span>
            </div>
            <div class="header-right">
                <span id="display-name" class="summoner-name"></span>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </header>

        <main>
            <!-- 成员管理 -->
            <section class="members-section">
                <div class="members-header">
                    <h3>审判庭成员 (<span id="member-count">0</span>)</h3>
                    <div class="member-actions">
                        <button class="clear-btn" onclick="clearMembers()">清空成员</button>
                    </div>
                </div>
                <div id="member-list" class="member-list">
                    <p class="empty-members">暂无成员，请邀请召唤师登录加入</p>
                </div>
                <div class="add-member-row">
                    <input type="text" id="add-member-input" placeholder="手动添加成员名称" maxlength="16">
                    <button onclick="addMemberManually()">添加</button>
                </div>
            </section>

            <!-- 转盘区域 -->
            <section class="wheel-section">
                <h2>转动命运之轮，选出今日法官</h2>
                <p class="wheel-desc">从所有已登录的召唤师中，随机抽选一位担任审判法官</p>
                <p id="wheel-warning" class="wheel-warning hidden">至少需要 2 位成员才能开始抽选</p>

                <div class="wheel-wrapper">
                    <div class="wheel-pointer">&#9660;</div>
                    <canvas id="wheel-canvas" width="500" height="500"></canvas>
                </div>

                <button id="spin-btn" class="spin-button" onclick="spinWheel()" disabled>开始抽选法官</button>
            </section>

            <!-- 审判结果 -->
            <div id="result-panel" class="result-panel hidden">
                <div class="result-content">
                    <div class="result-badge">&#9878;</div>
                    <h2 id="result-title"></h2>
                    <p id="result-desc"></p>
                    <div class="result-info">
                        <div class="info-item">
                            <span class="info-label">审判法官</span>
                            <span id="result-judge" class="info-value"></span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">发起人</span>
                            <span id="result-summoner" class="info-value"></span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">审判编号</span>
                            <span id="result-case" class="info-value"></span>
                        </div>
                    </div>
                    <button class="retry-btn" onclick="resetWheel()">重新抽选</button>
                </div>
            </div>

            <!-- 历史记录 -->
            <section class="history-section">
                <h3>审判记录</h3>
                <div id="history-list" class="history-list">
                    <p class="empty-history">暂无审判记录</p>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
