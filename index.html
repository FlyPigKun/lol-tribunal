<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英雄联盟 - 正义审判庭</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 开场动画层 -->
    <div id="intro-overlay" class="intro-overlay">
        <canvas id="intro-wheel" width="400" height="400"></canvas>
        <div id="intro-text" class="intro-text">
            <div class="intro-line line-1">THE TRIBUNAL</div>
            <div class="intro-line line-2">正 义 审 判 庭</div>
            <div class="intro-line line-3">审判之轮，即将转动</div>
        </div>
    </div>

    <!-- 登录页面 -->
    <div id="login-page" class="login-page">
        <div class="login-container">
            <div class="logo-area">
                <canvas id="logo-wheel" width="160" height="160"></canvas>
                <h1>正义审判庭</h1>
                <p class="subtitle">League of Legends Tribunal</p>
            </div>
            <div class="login-form">
                <div class="input-group">
                    <label>召唤师名称</label>
                    <input type="text" id="username" placeholder="输入你的名字" maxlength="16" autocomplete="off">
                </div>
                <button id="enter-btn">
                    <span class="btn-text">进入审判庭</span>
                    <span class="btn-arrow">&#9654;</span>
                </button>
            </div>
            <div class="online-count">
                已有 <span id="login-member-count">0</span> 位召唤师加入审判庭
            </div>
        </div>
        <div class="particles" id="particles"></div>
        <div class="corner-decor top-left"></div>
        <div class="corner-decor top-right"></div>
        <div class="corner-decor bottom-left"></div>
        <div class="corner-decor bottom-right"></div>
    </div>

    <!-- 跳转过渡层 -->
    <div id="exit-overlay" class="exit-overlay">
        <div class="exit-content">
            <div class="exit-wheel">&#9878;</div>
            <div class="exit-name" id="exit-name"></div>
            <div class="exit-sub">传送至审判庭...</div>
        </div>
    </div>

    <script src="intro.js"></script>
</body>
</html>
